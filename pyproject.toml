[project]
name = "svg-visual-normalize"
description = "This ComfyUI custom node processes SVG (Scalable Vector Graphics) images to ensure the artwork consistently fills its canvas, is visually centered, and optionally has a margin applied. It's designed to provide more accurate results for complex vector graphics, such as those generated by vector tracing tools, where simple geometric bounding boxes may not align with perceived visual extents."
version = "1.0.0"
license = {file = "LICENSE"}
dependencies = ["lxml>=4.5.0", "svg.path>=6.0", "CairoSVG>=2.5.0", "Pillow>=9.0.0"]

[project.urls]
Repository = "https://github.com/coulterj/comfyui-svg-visual-normalize"
